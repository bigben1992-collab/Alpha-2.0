<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap für modernes Design -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body { background-color: #f8f9fa; padding: 20px; }
      .card { border-radius: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
      .nav-pills .nav-link.active { background-color: #0d6efd; }
      #loader { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); z-index: 1000; justify-content: center; align-items: center; }
    </style>
  </head>
  <body>

    <div id="loader">
      <div class="spinner-border text-primary"></div>
    </div>

    <div class="container">
      <header class="pb-3 mb-4 border-bottom">
        <span class="fs-4 fw-bold">📦 Lager-System Pro 2026</span>
      </header>

      <!-- Navigation -->
      <ul class="nav nav-pills mb-4" id="pills-tab" role="tablist">
        <li class="nav-item"><button class="nav-link active" onclick="loadModule('buchung')">Buchung</button></li>
        <li class="nav-item"><button class="nav-link" onclick="loadModule('bestand')">Bestand</button></li>
        <li class="nav-item"><button class="nav-link" onclick="loadModule('statistik')">Statistik</button></li>
      </ul>

      <!-- Dynamischer Content Bereich -->
      <div id="app-content" class="card p-4">
        <!-- Hier laden wir die Module rein -->
        <div id="module-container">
           <h4>Willkommen!</h4>
           <p>Wähle oben eine Funktion aus, um zu starten.</p>
        </div>
      </div>
    </div>

    <script>
      // WICHTIG: Ersetze dies mit deiner Web-App URL nach dem Bereitstellen!
      const WEB_APP_URL = "DEINE_WEB_APP_URL_HIER";

      function showLoader(show) {
        document.getElementById('loader').style.display = show ? 'flex' : 'none';
      }

      // Funktion zum Laden der Module (Platzhalter für den Anfang)
      function loadModule(name) {
        if(name === 'buchung') renderBuchungForm();
        // Weitere folgen...
      }
      function renderBuchungForm() {
  const container = document.getElementById('module-container');
  container.innerHTML = `
    <h3>Warenbuchung</h3>
    <form id="buchungsForm" class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Artikel-ID (Scan)</label>
        <input type="text" class="form-control" id="artId" required onchange="checkArtikel()">
        <div id="artFeedback" class="form-text text-primary"></div>
      </div>
      <div class="col-md-6">
        <label class="form-label">Platz (Lagerort)</label>
        <input type="text" class="form-control" id="platz" value="Lager">
      </div>
      <div class="col-md-4">
        <label class="form-label">Typ</label>
        <select class="form-select" id="typ">
          <option value="Kauf">Kauf (Bestand +)</option>
          <option value="Verkauf">Verkauf (Bestand -)</option>
          <option value="Zugang">Zugang (Manuell +)</option>
          <option value="Entnahme">Entnahme (Manuell -)</option>
        </select>
      </div>
      <div class="col-md-4">
        <label class="form-label">Menge</label>
        <input type="number" class="form-control" id="menge" step="0.01" required>
      </div>
      <div class="col-md-4">
        <label class="form-label">Preis (optional)</label>
        <input type="text" class="form-control" id="preis" placeholder="0,00">
      </div>
      <div class="col-12 mt-4">
        <button type="submit" class="btn btn-primary w-100 p-3">Buchung durchführen</button>
      </div>
    </form>
  `;

  document.getElementById('buchungsForm').onsubmit = submitBuchung;
}

// Prüft beim Scannen/Eingeben sofort, ob der Artikel existiert
async function checkArtikel() {
  const id = document.getElementById('artId').value;
  if(!id) return;
  
  const res = await fetch(`${WEB_APP_URL}?aktion=warensuche&artikelId=${id}`);
  const data = await res.json();
  
  const feedback = document.getElementById('artFeedback');
  if(data.name) {
    feedback.innerText = "Gefunden: " + data.name + " (Aktueller Preis: " + data.preis + ")";
  } else {
    feedback.innerText = "Neuaufnahme: Name wird bei Buchung angelegt.";
  }
}

async function submitBuchung(e) {
  e.preventDefault();
  showLoader(true);

  const payload = {
    daten: {
      artikel: document.getElementById('artId').value,
      platz: document.getElementById('platz').value,
      typ: document.getElementById('typ').value,
      menge: document.getElementById('menge').value,
      preis: document.getElementById('preis').value
    }
  };

  try {
    const response = await fetch(WEB_APP_URL, {
      method: 'POST',
      body: JSON.stringify(payload)
    });
    const result = await response.json();

    if(result.status === "success") {
      alert("Erfolgreich gebucht: " + result.name);
      document.getElementById('buchungsForm').reset();
    } else {
      alert("Fehler: " + result.msg);
    }
  } catch (err) {
    alert("Netzwerkfehler: " + err);
  }
  showLoader(false);
}
    </script>
  </body>
</html>
